<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Tree — Grid Template</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:wght@400;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0c0803; }

.viewport {
  width: 100vw; height: 100vh; overflow: auto;
  background: radial-gradient(ellipse at center bottom, #3a2a15 0%, #0c0803 70%);
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
.scroll-wrapper {
  display: flex; align-items: center; justify-content: center;
  min-width: 100vw; min-height: 100vh;
  padding: 20px;
}
.poster {
  position: relative;
  width: 1800px; height: 981px;
  flex-shrink: 0;
  background: url('family-tree-bg-v2.jpeg') no-repeat center center;
  background-size: 100% 100%;
  border: 14px solid #1e140a;
  box-shadow: 0 0 50px rgba(0,0,0,0.8);
}

/* Grid overlay */
.grid-overlay {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 100;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.grid-overlay.active { opacity: 1; }
.grid-line-h {
  position: absolute; left: 0; right: 0;
  border-top: 1.5px dashed rgba(255,30,30,0.55);
}
.grid-line-v {
  position: absolute; top: 0; bottom: 0;
  border-left: 1.5px dashed rgba(255,30,30,0.55);
}
.grid-label-x {
  position: absolute; bottom: -22px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px; color: rgba(255,30,30,0.85);
  font-weight: 600;
  transform: translateX(-50%);
  background: rgba(253,243,216,0.85);
  padding: 1px 5px;
  border-radius: 3px;
  line-height: 1;
}
.grid-label-y {
  position: absolute; left: -28px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px; color: rgba(255,30,30,0.85);
  font-weight: 600;
  transform: translateY(-50%);
  background: rgba(253,243,216,0.85);
  padding: 1px 5px;
  border-radius: 3px;
  line-height: 1;
}
.grid-toggle {
  position: fixed; top: 20px; left: 20px;
  z-index: 200;
  padding: 10px 20px;
  background: #e8dcc8; border: 2px solid #6b5537;
  border-radius: 6px;
  font-family: 'Cinzel Decorative', serif;
  font-size: 14px; color: #1e140a;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.3);
}
.grid-toggle:active { transform: scale(0.95); }

.slot {
  position: absolute; width: 80px; height: 44px;
  background: rgba(245,236,216,0.82);
  border: 1.5px solid #7a5e3a; border-radius: 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 9px; color: #1e140a; line-height: 1.2;
  box-shadow: 0 2px 6px rgba(60,40,10,0.2), inset 0 1px 2px rgba(255,255,255,0.4);
  z-index: 5; cursor: pointer;
  transition: all 0.2s ease;
  transform: translate(-50%, -50%);
  padding: 2px; overflow: hidden;
}
.slot:hover {
  transform: translate(-50%, -50%) scale(1.15);
  background: rgba(255,248,232,0.95);
  box-shadow: 0 5px 14px rgba(60,40,10,0.35); z-index: 50;
}
.slot.empty {
  background: rgba(245,236,216,0.25);
  border-style: dashed; border-color: #a09070;
  color: #908060;
}
.slot .surname { font-weight: 600; font-size: 9.5px; display: block; }
.slot .years { font-size: 7.5px; color: #7a6545; display: block; margin-top: 1px; }

.zoom-controls {
  position: fixed; bottom: 20px; left: 20px;
  z-index: 200; display: flex; flex-direction: column; gap: 8px;
}
.zoom-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: 2px solid #6b5537; background: #e8dcc8; color: #1e140a;
  font-size: 20px; font-family: 'Cinzel Decorative', serif;
  cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,0.3);
  display: flex; align-items: center; justify-content: center;
  user-select: none;
}
.zoom-btn:active { transform: scale(0.92); }
.zoom-level {
  text-align: center; font-family: 'Cormorant Garamond', serif;
  font-size: 13px; color: #e8dcc8; font-weight: 600;
}

.overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 150;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.overlay.active { opacity: 1; pointer-events: auto; }

.detail-popup {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  background: #f5e6c8; border: 3px solid #6b5537;
  border-radius: 12px; padding: 24px 32px; z-index: 200;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  font-family: 'Cormorant Garamond', serif;
  color: #1e140a; min-width: 280px;
  opacity: 0; pointer-events: none;
  transition: all 0.25s ease;
}
.detail-popup.active {
  opacity: 1; pointer-events: auto;
  transform: translate(-50%, -50%) scale(1);
}
.detail-popup h3 {
  font-family: 'Cinzel Decorative', serif;
  font-size: 20px; margin-bottom: 8px;
  border-bottom: 1px solid #a08b6a; padding-bottom: 8px;
}
.detail-popup .detail-row {
  display: flex; justify-content: space-between;
  margin: 6px 0; font-size: 14px;
}
.detail-popup .detail-row .label { color: #5a4428; }
.detail-popup .detail-row .value { font-weight: 600; }
.detail-popup .close-btn {
  position: absolute; top: 8px; right: 12px;
  background: none; border: none; font-size: 24px;
  cursor: pointer; color: #5a4428;
}

/* Coord readout */
.coord-readout {
  position: fixed; top: 20px; right: 20px;
  z-index: 200;
  background: rgba(0,0,0,0.7);
  color: #e8dcc8;
  padding: 8px 14px;
  border-radius: 6px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  pointer-events: none;
}
</style>
</head>

<script>
// Grid config
const cols = 40;
const rows = 25;
const w = 1800;
const h = 981;
const cellW = w / cols;
const cellH = h / rows;

const gridOverlay = document.getElementById('gridOverlay');
const gridToggle = document.getElementById('gridToggle');
const poster = document.getElementById('poster');

// Build grid
for (let i = 0; i <= cols; i++) {
  const x = i * cellW;
  const line = document.createElement('div');
  line.className = 'grid-line-v';
  line.style.left = x + 'px';
  gridOverlay.appendChild(line);
  
  if (i < cols && i % 5 === 0) {
    const label = document.createElement('div');
    label.className = 'grid-label-x';
    label.style.left = (x + cellW/2) + 'px';
    label.textContent = i;
    gridOverlay.appendChild(label);
  }
}

for (let i = 0; i <= rows; i++) {
  const y = i * cellH;
  const line = document.createElement('div');
  line.className = 'grid-line-h';
  line.style.top = y + 'px';
  gridOverlay.appendChild(line);
  
  if (i < rows && i % 5 === 0) {
    const label = document.createElement('div');
    label.className = 'grid-label-y';
    label.style.top = (y + cellH/2) + 'px';
    label.textContent = i;
    gridOverlay.appendChild(label);
  }
}

gridToggle.addEventListener('click', () => {
  gridOverlay.classList.toggle('active');
  gridToggle.textContent = gridOverlay.classList.contains('active') ? 'Hide Grid' : 'Show Grid';
});

// Show grid by default
gridOverlay.classList.add('active');
gridToggle.textContent = 'Hide Grid';

// Coordinate readout on hover
const coordReadout = document.getElementById('coordReadout');
poster.addEventListener('mousemove', (e) => {
  const rect = poster.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const col = Math.round(x / cellW);
  const row = Math.round(y / cellH);
  coordReadout.textContent = `Col: ${col}, Row: ${row} | Pixel: ${Math.round(x)}, ${Math.round(y)}`;
});

// Zoom
let scale = 1;
const zoomLevel = document.getElementById('zoomLevel');
function updateZoom() {
  poster.style.zoom = scale;
  zoomLevel.textContent = Math.round(scale * 100) + '%';
}
document.getElementById('zoomIn').addEventListener('click', () => { scale = Math.min(scale + 0.2, 3); updateZoom(); });
document.getElementById('zoomOut').addEventListener('click', () => { scale = Math.max(scale - 0.2, 0.3); updateZoom(); });
document.getElementById('zoomReset').addEventListener('click', () => { scale = 1; updateZoom(); });

// Popup
const popup = document.getElementById('detailPopup');
const overlay = document.getElementById('overlay');
const closeBtn = document.getElementById('closePopup');

function openPopup(level, pos, x, y) {
  const col = Math.round(x / cellW);
  const row = Math.round(y / cellH);
  document.getElementById('popupName').textContent = `Level ${level} — Slot ${pos}`;
  document.getElementById('popupLevel').textContent = level;
  document.getElementById('popupPos').textContent = pos;
  document.getElementById('popupGrid').textContent = `Col ${col}, Row ${row}`;
  popup.classList.add('active');
  overlay.classList.add('active');
}
function closePopup() {
  popup.classList.remove('active');
  overlay.classList.remove('active');
}

document.querySelectorAll('.slot').forEach(slot => {
  slot.addEventListener('click', () => {
    const level = slot.dataset.level;
    const pos = slot.dataset.pos;
    const x = parseFloat(slot.style.left);
    const y = parseFloat(slot.style.top);
    openPopup(level, pos, x, y);
  });
});
closeBtn.addEventListener('click', closePopup);
overlay.addEventListener('click', closePopup);
</script>

</body>
</html>
