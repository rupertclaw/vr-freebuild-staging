<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Family Builder - GED Test</title>
<script>
window.addEventListener('load', function() {
  var iframe = document.getElementById('fb');
  iframe.addEventListener('load', function() {
    // Wait for the inner page to fully initialize
    setTimeout(function() {
      fetch('mooney-test.ged')
        .then(function(r) { return r.text(); })
        .then(function(text) {
          var iframeDoc = iframe.contentWindow.document;
          var input = iframeDoc.getElementById('gedcomInput');
          if (!input) {
            document.getElementById('status').textContent = 'No gedcomInput in iframe';
            return;
          }
          var blob = new Blob([text], {type: 'text/plain'});
          var file = new File([blob], '2025_mooney.ged', {type: 'text/plain'});
          var dt = new DataTransfer();
          dt.items.add(file);
          input.files = dt.files;
          input.dispatchEvent(new Event('change', {bubbles: true}));
          document.getElementById('status').textContent = 'GED loaded: ' + text.length + ' chars';
        })
        .catch(function(e) {
          document.getElementById('status').textContent = 'Error: ' + e.message;
        });
    }, 3000);
  });
  iframe.src = 'family-builder.html';
});
</script>
</head>
<body>
<div id="status">Loading...</div>
<iframe style="width:100%;height:90vh;border:none;" id="fb"></iframe>
</body>
</html>
