<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Family Builder - GED Test</title>
<script>
// Auto-load GED file on page load
window.addEventListener('load', function() {
  fetch('mooney-test.ged')
    .then(function(r) { return r.text(); })
    .then(function(text) {
      var blob = new Blob([text], {type: 'text/plain'});
      var file = new File([blob], '2025_mooney.ged', {type: 'text/plain'});
      var input = document.getElementById('gedcomInput');
      if (!input) {
        document.getElementById('status').textContent = 'No gedcomInput found';
        return;
      }
      var dt = new DataTransfer();
      dt.items.add(file);
      input.files = dt.files;
      input.dispatchEvent(new Event('change', {bubbles: true}));
      document.getElementById('status').textContent = 'GED loaded: ' + text.length + ' chars';
    })
    .catch(function(e) {
      document.getElementById('status').textContent = 'Error: ' + e.message;
    });
});
</script>
</head>
<body>
<div id="status">Loading GED...</div>
<iframe src="family-builder.html" style="width:100%;height:90vh;border:none;" id="fb"></iframe>
</body>
</html>
